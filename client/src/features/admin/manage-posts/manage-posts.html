<div class="h-screen flex flex-col">
  <!-- Header -->
  <div class="flex-shrink-0 bg-base-100 border-b border-base-300 p-4">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
      <div>
        <h1 class="text-2xl font-bold text-base-content">Manage Posts</h1>
        <p class="text-base-content/70 text-sm">Create, edit, and manage your blog posts</p>
      </div>
      <button
        (click)="onCreateNewPost()"
        class="btn btn-primary btn-sm gap-2"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Create New Post
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex">
    <!-- Posts List -->
    <div class="w-1/3">
      <app-posts-list
        (postSelected)="onPostSelected($event)"
        (createNewPost)="onCreateNewPost()">
      </app-posts-list>
    </div>

    <!-- Post Editor -->
    @if (selectedPost() || isCreatingNew()) {
      <div class="flex-1 flex flex-col">
        <app-post-editor
          [selectedPost]="selectedPost"
          [isCreatingNew]="isCreatingNew"
          (postSaved)="onPostSaved()"
          (postDeleted)="onPostDeleted()"
          (editCancelled)="onEditCancelled()">
        </app-post-editor>
      </div>
    } @else {
      <!-- Empty State -->
      <div class="flex-1 flex items-center justify-center bg-base-200">
        <div class="text-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-base-content/30 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          <h3 class="text-lg font-semibold text-base-content/70 mb-2">Select a Post to Edit</h3>
          <p class="text-base-content/50 text-sm">Choose a post from the list or create a new one</p>
        </div>
      </div>
    }
  </div>
</div>
