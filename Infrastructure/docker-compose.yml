version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password
    ports:
      - "1433:1433"
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "sqlcmd", "-U", "myuser", "-P", "Password", "-Q", "SELECT 1"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myblog-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=mydb;User Id=myuser;Password=Password
    ports:
      - "5000:80"
    networks:
      - appnet
    volumes:
      - ./appsettings.Development.json:/app/appsettings.Development.json

networks:
  appnet:
    driver: bridge
