services:
  db:
    image: postgres:16
    platform: linux/amd64
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      retries: 5

  api:
    image: haydn202/myblog-api
    platform: linux/amd64
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=mydb;Username=myuser;Password=mypass
    networks:
      - appnet

networks:
  appnet:
    driver: bridge